name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # The code uses PEP 604 unions (str | None), so 3.10 is the floor.
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      # Plain `pytest` runs the hermetic unit tests only. Live Slack/Box is
      # never exercised here: there are no Slack secrets in CI, and the live
      # Box tests are opt-in (`--run-box-live`) and self-skip without BOX_*
      # creds. Do NOT add `--run-box-live` — this is a public repo with no
      # committed .env / secrets.
      - name: Run tests
        run: pytest
